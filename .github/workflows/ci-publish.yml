name: Test and publish

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:chromium

  publish:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/packet7hrower/floorplan
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  runtime-smoke:
    if: github.event_name != 'pull_request'
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate root Compose file
        run: docker compose config --quiet
      - name: Start published image anonymously
        run: docker compose up -d
      - name: Verify health, SPA fallback, and unprivileged runtime
        run: |
          for attempt in {1..30}; do
            if [ "$(curl -fsS http://127.0.0.1:8080/healthz || true)" = "ok" ]; then
              break
            fi
            sleep 1
          done
          test "$(curl -fsS http://127.0.0.1:8080/healthz)" = "ok"
          curl -fsS http://127.0.0.1:8080/projects/example | grep -q "<title>Floorplan</title>"
          container_id="$(docker compose ps -q floorplan)"
          test -n "$container_id"
          test "$(docker inspect --format '{{.Config.User}}' "$container_id")" != "root"
          docker compose ps
      - name: Stop smoke stack
        if: always()
        run: docker compose down --remove-orphans
